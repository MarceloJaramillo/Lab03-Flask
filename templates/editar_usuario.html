{% extends "base.html" %}

{% block title %}Editar Usuario{% endblock %}

{% block content %}
<section class="form-card">
    <div class="section-header">
        <div>
            <h2>Editar Usuario</h2>
            <p>Actualiza los datos del usuario seleccionado.</p>
        </div>
    </div>

    <form method="POST" class="form-grid">
        <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" value="{{ usuario['nombre'] }}" required>
        </div>

        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" value="{{ usuario['email'] }}" required>
        </div>

        <div class="form-group">
            <label for="rol">Rol</label>
            <select id="rol" name="rol" required>
                <option value="admin" {% if usuario['rol'] == 'admin' %}selected{% endif %}>Admin</option>
                <option value="usuario" {% if usuario['rol'] == 'usuario' %}selected{% endif %}>Usuario</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-warning">Actualizar usuario</button>
            <a href="{{ url_for('listar_usuarios') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
